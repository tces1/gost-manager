<div class="min-h-screen bg-slate-950 p-8 font-sans text-slate-200">
  <div class="max-w-6xl mx-auto space-y-12">
    <h1 class="text-3xl font-extrabold text-white tracking-tight border-b border-slate-800 pb-4 text-center">选择您喜欢的现代风格</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      
      <!-- Option A: Modern Dark SaaS -->
      <div class="group cursor-pointer" data-select="modern-saas">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-xl font-bold text-indigo-400">方案 A: 现代深色专业风</h2>
          <span class="text-xs bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded">推荐</span>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl transition-all group-hover:border-indigo-500/50">
          <div class="flex items-center space-x-3 mb-6">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div>
              <div class="text-white font-bold">GOST Manager</div>
              <div class="text-xs text-slate-500">System Dashboard</div>
            </div>
          </div>
          
          <div class="space-y-3">
            <div class="bg-slate-800/50 p-3 rounded-xl flex justify-between items-center border border-slate-700/50">
              <span class="text-sm font-medium">8080 → 1.2.3.4:80</span>
              <div class="flex space-x-2">
                <div class="w-6 h-6 bg-slate-700 rounded flex items-center justify-center text-xs">Edit</div>
              </div>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-xl flex justify-between items-center border border-slate-700/50">
              <span class="text-sm font-medium">9090 → 8.8.8.8:53</span>
              <div class="flex space-x-2 text-red-400">
                 <div class="w-6 h-6 bg-slate-700 rounded flex items-center justify-center text-xs">Del</div>
              </div>
            </div>
          </div>
          
          <button class="w-full mt-6 bg-indigo-600 text-white rounded-xl py-2.5 font-semibold text-sm shadow-lg shadow-indigo-600/30 hover:bg-indigo-500 transition-colors">
            立即部署配置
          </button>
        </div>
        <p class="mt-4 text-sm text-slate-500 text-center">沉稳、严谨，像 Linear 一样好用</p>
      </div>

      <!-- Option B: Glassmorphism -->
      <div class="group cursor-pointer" data-select="glass">
        <div class="mb-4">
          <h2 class="text-xl font-bold text-pink-400">方案 B: 毛玻璃通透风</h2>
        </div>
        <div class="relative overflow-hidden rounded-2xl p-6 border border-white/10 shadow-2xl transition-all group-hover:border-pink-500/30">
          <!-- Background decorative blobs -->
          <div class="absolute -top-12 -left-12 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>
          <div class="absolute -bottom-12 -right-12 w-32 h-32 bg-pink-500/20 rounded-full blur-3xl"></div>
          
          <div class="relative backdrop-blur-xl bg-white/5 rounded-xl p-4 border border-white/10">
            <div class="flex items-center space-x-3 mb-6">
               <div class="w-8 h-8 bg-gradient-to-tr from-pink-500 to-indigo-500 rounded-full"></div>
               <span class="font-bold text-white tracking-wide">PANEL CORE</span>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
              <div class="bg-white/5 p-3 rounded-lg border border-white/5">
                <div class="text-[10px] text-white/50 uppercase">Active</div>
                <div class="text-xl font-bold">12</div>
              </div>
              <div class="bg-white/5 p-3 rounded-lg border border-white/5">
                <div class="text-[10px] text-white/50 uppercase">Status</div>
                <div class="text-xl font-bold text-green-400">Live</div>
              </div>
            </div>
            
            <button class="w-full bg-white/10 hover:bg-white/20 text-white rounded-lg py-2 text-sm font-medium border border-white/20 transition-all backdrop-blur-md">
              REFRESH_DATA()
            </button>
          </div>
        </div>
        <p class="mt-4 text-sm text-slate-500 text-center">轻盈、通透，极具现代时尚感</p>
      </div>

    </div>
    
    <div class="mt-8 p-4 bg-slate-900/50 border border-slate-800 rounded-xl text-center text-sm text-slate-400">
      请在浏览器中查看对比效果，然后告诉我您的选择。
    </div>
  </div>
</div>
